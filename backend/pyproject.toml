[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in default arguments (FastAPI pattern)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "B017"]  # allow assert + broad raises in tests

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
disallow_untyped_defs = true
warn_return_any = false
warn_unused_ignores = true

# python-docx ships no type stubs — suppress all errors from those modules
[[tool.mypy.overrides]]
module = [
    "app.services.parser",
    "app.services.reconstructor",
]
ignore_errors = true

# anthropic SDK overload resolution noise
[[tool.mypy.overrides]]
module = "app.services.analyzer"
disallow_untyped_defs = false
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
